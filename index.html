<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chhingchhip Mualpui Br. KTP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="light">

<header>
    <div class="logo">
        <img src="https://i.pinimg.com/736x/c4/63/80/c46380515200eca4015ba39e78eebfa6.jpg" alt="Logo">
        <h2>Chhingchhip Mualpui Br. <span>KTP</span></h2>
    </div>
    <nav>
        <ul id="navLinks">
            <li><a onclick="showSection('home')">Home</a></li>
            <li><a onclick="showSection('member-page')">Member List</a></li>
            <li><a onclick="showSection('gallery-page')">Gallery</a></li>
        </ul>
        <button class="theme-toggle" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></button>
    </nav>
</header>

<div class="role-bar">
    <label>Mode: </label>
    <select id="roleSelector" onchange="toggleRole()">
        <option value="user">Member (View Only)</option>
        <option value="admin">Administrator (Full Access)</option>
    </select>
</div>

<div id="home" class="section">
    <section class="hero">
        <div class="left-content">
            <h1 class="chibai">Chibai le</h1>
            <p>Kristian Ṭhalai Pawl,<br>Chhingchhip Mualpui Branch </p>
            <button class="btn" onclick="showSection('member-page')">Member List 2026 →</button>
            <button class="btn" style="background: #6f42c1;" onclick="showHruaitute()">2026 Hruaitute →</button>
        </div>
        <div class="right-content">
            <img src="https://i.pinimg.com/736x/c4/63/80/c46380515200eca4015ba39e78eebfa6.jpg" alt="Main Logo" style="width: 300px;">
        </div>
    </section>
</div>

<section id="member-page" class="container section hidden">
    <h2>Member List 2026</h2>
    
    <div class="input-group admin-only hidden">
        <input type="text" id="nameInput" placeholder="Member hming...">
        <select id="sectionInput">
            <option value="Mualpui Kawn">Mualpui kawn</option>
            <option value="Hmarveng">Hmarveng</option>
            <option value="Biak in Veng">Biak In Veng</option>
            <option value="Bangla">Bangla</option> 
        </select>
        <button id="addBtn" class="add-btn" onclick="addMember()">Add</button>
        <button id="updateBtn" class="add-btn hidden" onclick="saveEdit()">Update</button>
    </div>

    <table>
        <thead>
            <tr><th>No.</th><th>Hming</th><th>Section</th><th>Action</th></tr>
        </thead>
        <tbody id="memberListTable"></tbody>
    </table>
</section>

<section id="gallery-page" class="container section hidden">
    <h2>Picture Gallery</h2>
    
    <div class="admin-only hidden" style="background: var(--bg-color); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        <p><b>Admin Controls:</b></p>
        <div class="input-group">
            <input type="text" id="folderNameInput" placeholder="Folder hming...">
            <button onclick="createFolder()" class="add-btn" style="background: #1e73be;">Create Folder</button>
        </div>
        <div class="input-group">
            <input type="file" id="imageInput" accept="image/*">
            <button onclick="uploadImage()" class="add-btn">Upload Image</button>
        </div>
    </div>

    <div class="folder-list" id="folderTabs"></div>
    <div class="gallery-grid" id="galleryGrid"></div>
</section>

<script src="script.js"></script>
</body>
</html>
